# Tag-driven release. Push a `v*` tag and this drafts a GitHub Release with
# auto-generated notes. SwiftPM consumers resolve via the tag (no asset upload
# needed — GitHub attaches the source archive automatically).
#
#   git tag v0.1.0 && git push origin v0.1.0
#
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
